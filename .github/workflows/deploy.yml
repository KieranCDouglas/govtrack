name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: source/congress-tracker

      - name: Build client
        run: npx vite build
        working-directory: source/congress-tracker

      - name: Copy built assets to repo root assets/
        run: cp source/congress-tracker/dist/public/assets/* assets/

      - name: Update index.html asset references
        run: |
          NEW_JS=$(ls assets/index-*.js | xargs basename)
          NEW_CSS=$(ls assets/index-*.css | xargs basename)
          sed -i "s|assets/index-[^\"]*\.js|assets/${NEW_JS}|g" index.html
          sed -i "s|assets/index-[^\"]*\.css|assets/${NEW_CSS}|g" index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
