name: Refresh Congressional Data

on:
  schedule:
    # Run daily at 6:00 AM UTC (1:00 AM EST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create data directories
        run: mkdir -p data/votes data/opensecrets data/scorecards data/scoring-inputs

      - name: Refresh data from Voteview and GovTrack
        run: python3 scripts/update_current.py

      - name: Refresh ballot measures from Ballotpedia
        run: python3 scripts/fetch_ballot_measures.py

      - name: Update manifest timestamp
        run: |
          python3 -c "
          import json, datetime
          manifest = {'lastUpdated': datetime.datetime.utcnow().isoformat() + 'Z', 'congress': 119, 'source': 'automated'}
          with open('data/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          "

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: refresh congressional data [automated]"
            git push
          fi

  deploy:
    needs: refresh-data
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: source/congress-tracker/package-lock.json

      - name: Install dependencies
        working-directory: source/congress-tracker
        run: npm ci

      - name: Build React app
        working-directory: source/congress-tracker
        run: npm run build:static
        env:
          VITE_BASE_PATH: /

      - name: Copy built assets to root
        run: cp -r source/congress-tracker/dist/public/assets ./assets

      - name: Update asset references in root index.html
        run: |
          BUILT_INDEX=source/congress-tracker/dist/public/index.html
          NEW_JS=$(grep -o 'assets/index-[^"]*\.js' "$BUILT_INDEX" | head -1)
          NEW_CSS=$(grep -o 'assets/index-[^"]*\.css' "$BUILT_INDEX" | head -1)
          NEW_QUERY=$(grep -o 'assets/query-vendor-[^"]*\.js' "$BUILT_INDEX" | head -1)
          NEW_UI=$(grep -o 'assets/ui-vendor-[^"]*\.js' "$BUILT_INDEX" | head -1)
          sed -i "s|assets/index-[^\"]*\.js|$NEW_JS|g" index.html
          sed -i "s|assets/index-[^\"]*\.css|$NEW_CSS|g" index.html
          sed -i "s|assets/query-vendor-[^\"]*\.js|$NEW_QUERY|g" index.html
          sed -i "s|assets/ui-vendor-[^\"]*\.js|$NEW_UI|g" index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
