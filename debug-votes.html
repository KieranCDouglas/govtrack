<!DOCTYPE html>
<html>
<head><title>Debug Votes</title></head>
<body>
<h1>Vote Loading Debug</h1>
<pre id="out">Loading...</pre>
<script src="./data-loader.js"></script>
<script>
var out = document.getElementById('out');
var log = '';
function w(s) { log += s + '\n'; out.textContent = log; }

w('1. __cwLoadVotes defined? ' + (typeof window.__cwLoadVotes));

// Test members-index.json fetch
fetch('./data/members-index.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    w('2. members-index.json loaded: ' + data.length + ' entries');
    var pelosi = data.find(function(m) { return m.b === 'P000197'; });
    w('3. Pelosi found? ' + JSON.stringify(pelosi));
    
    // Test vote data fetch
    return fetch('./data/votes/H119.json');
  })
  .then(function(r) {
    w('4. H119.json status: ' + r.status);
    return r.json();
  })
  .then(function(data) {
    w('5. H119 rollcalls: ' + data.r.length);
    w('6. H119 vote keys (first 5): ' + Object.keys(data.v).slice(0, 5).join(','));
    // Check for Pelosi's ICPSR (14805)
    var pv = data.v['14805'];
    w('7. Pelosi votes (ICPSR 14805): ' + (pv ? pv.substring(0, 50) + '... len=' + pv.length : 'NOT FOUND'));
    
    // Now test __cwLoadVotes
    w('8. Calling __cwLoadVotes("P000197", null)...');
    return window.__cwLoadVotes('P000197', null);
  })
  .then(function(result) {
    w('9. Result: totalCount=' + result.totalCount + ' source=' + result.source + ' votes.length=' + result.votes.length);
    if (result.votes.length > 0) {
      w('10. First vote: ' + JSON.stringify(result.votes[0]));
    }
  })
  .catch(function(err) {
    w('ERROR: ' + err.message + '\n' + err.stack);
  });
</script>
</body>
</html>
